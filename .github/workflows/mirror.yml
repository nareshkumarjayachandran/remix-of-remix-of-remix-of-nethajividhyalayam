name: Mirror to Account B

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # IMPORTANT

      - name: Configure Git
        run: |
          git config --global user.name "nethajividhyalayam"
          git config --global user.email "nethajividhyalayam@gmail.com"

      - name: Push to destination
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN1 }}
        run: |
          echo "🚀 Mirroring to Account B..."
          
          # Add remote using token
          git remote add target https://nethajividhyalayam:${TOKEN}@github.com/nethajividhyalayam/Websites.git
          
          # Push all branches and tags
          git push --mirror target
          
          echo "✅ Mirror complete!"
