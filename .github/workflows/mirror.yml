name: Mirror Fixed

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push with OAuth2 format
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN1 }}
        run: |
          git config --global user.name "nethajividhyalayam"
          git config --global user.email "nethajividhyalayam@gmail.com"
          
          # Use oauth2 format instead of username:token
          git remote add target https://oauth2:${TOKEN}@github.com/nethajividhyalayam/Websites.git
          
          git push --mirror target
