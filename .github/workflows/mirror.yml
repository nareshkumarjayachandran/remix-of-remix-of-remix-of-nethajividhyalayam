name: Mirror Repository

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [sync]

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${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}" ]; then
            echo "Error: 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 secret is not set." >&2
            exit 1
          fi
          if [ -z "${nareshkumarjayachandran/remix-of-remix-of-remix-of-nethajividhyalayam}" ]; then
            echo "Error: nareshkumarjayachandran/remix-of-remix-of-remix-of-nethajividhyalayam secret is not set." >&2
            exit 1
          fi
        env:
          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: ${{ secrets.MIRROR_TOKEN }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO }}

      - name: Mirroring to Account B
        # SOURCE_REPO must be set as a repository secret in the format: owner/repo-name
        # MIRROR_TOKEN must be a PAT with read access to the source repo (Account A)
        run: |
          set -e
          git clone --bare "https://x-access-token:${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}@github.com/${nareshkumarjayachandran/remix-of-remix-of-remix-of-nethajividhyalayam}.git" repo-mirror
          cd repo-mirror
          git push --mirror "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        env:
          MIRROR_TOKEN: ${{ secrets.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 }}
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_REPO: ${{ secrets.nareshkumarjayachandran/remix-of-remix-of-remix-of-nethajividhyalayam }}
