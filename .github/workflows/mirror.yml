name: Mirror Fixed

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target repo
        run: |
          git config --global user.name "nethajividhyalayam"
          git config --global user.email "nethajividhyalayam@gmail.com"
          
          # Disable default credential helper so our token is used
          git config --global --unset-all http.https://github.com/.extraheader || true
          
          git remote add target https://${{ secrets.TARGET_REPO_TOKEN1 }}@github.com/nethajividhyalayam/Websites.git
          
          git push target --force --all
          git push target --force --tags
