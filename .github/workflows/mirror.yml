name: Mirror to Second Account

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Verify destination repo
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          # Check if destination repo exists and is accessible
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/nethajividhyalayam/Websites)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Destination repository exists and accessible"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "❌ Destination repository not found!"
            echo "Please create it first: https://github.com/nethajividhyalayam/Websites"
            exit 1
          else
            echo "❌ Cannot access repository (HTTP $HTTP_CODE)"
            echo "Check token permissions"
            exit 1
          fi

      - name: Push to destination
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          # Add remote
          git remote add target https://x-access-token:${TOKEN}@github.com/nethajividhyalayam/Websites.git
          
          # Try to fetch from destination to see what's there
          git fetch target --dry-run 2>/dev/null || echo "Destination may be empty"
          
          # Push main branch with force if needed
          echo "Pushing to destination..."
          if git push --force target main; then
            echo "✅ Successfully synced main branch"
          else
            echo "❌ Push failed"
            exit 1
          fi
          
          # Optionally push tags
          git push --tags target
