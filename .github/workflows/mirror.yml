name: Mirror to Account B

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allows manual trigger

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for mirroring

      - name: Verify token (debug step)
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          echo "🔍 Verifying token..."
          # Test token with GitHub API (shows only first 4 chars for security)
          echo "Token prefix: ${TOKEN:0:4}..."
          echo "Token length: ${#TOKEN}"
          
          # Check token owner
          RESPONSE=$(curl -s -H "Authorization: token $TOKEN" \
            https://api.github.com/user)
          
          if echo "$RESPONSE" | grep -q "login"; then
            USERNAME=$(echo "$RESPONSE" | grep -o '"login": "[^"]*"' | cut -d'"' -f4)
            echo "✅ Token belongs to: $USERNAME"
          else
            echo "❌ Token invalid or expired"
            echo "Please generate a new token in Account B with 'repo' scope"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Sync Bot"
          git config --global user.email "sync@github.com"

      - name: Add destination remote
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          # Add Account B as remote using token authentication
          git remote add destination https://x-access-token:${TOKEN}@github.com/nethajividhyalayam/Websites.git
          echo "✅ Remote added: destination"
          git remote -v

      - name: Push to Account B
        run: |
          echo "🚀 Mirroring to Account B..."
          # Push all branches and tags
          git push --mirror destination
          
          if [ $? -eq 0 ]; then
            echo "✅ Successfully mirrored to Account B!"
          else
            echo "❌ Mirror failed"
            exit 1
          fi
