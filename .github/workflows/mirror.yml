name: Mirror Fixed

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target repo
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN1 }}
        run: |
          git config --global user.name "nethajividhyalayam"
          git config --global user.email "nethajividhyalayam@gmail.com"
          
          git remote add target https://x-access-token:${TOKEN}@github.com/nethajividhyalayam/Websites.git
          
          git push target --force --all
          git push target --force --tags
