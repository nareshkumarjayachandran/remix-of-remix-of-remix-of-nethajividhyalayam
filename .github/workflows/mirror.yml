name: Debug Mirror

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Try mirror and show error
        env:
          TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          # Add remote
          git remote add target https://x-access-token:${TOKEN}@github.com/nethajividhyalayam/Websites.git
          
          # Try push and capture error
          git push --mirror target 2>&1 || {
            echo "=== ERROR DETAILS ==="
            echo "Push failed with exit code: $?"
            echo "Current remotes:"
            git remote -v
            echo "Current branches:"
            git branch -a
            exit 1
          }
